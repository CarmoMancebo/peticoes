<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin — Gerador de Petições</title>
<!--
  PAINEL ADMINISTRATIVO — Gerador de Petições
  Acesso restrito a usuários com is_admin = true em gp_users.

  SETUP INICIAL (executar uma única vez no SQL Editor do Supabase):
  ─────────────────────────────────────────────────────────────────
  UPDATE gp_users
  SET is_admin = true
  WHERE email = 'SEU_EMAIL_AQUI';
  ─────────────────────────────────────────────────────────────────
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F8FAFC;
  --bg2: #F1F5F9;
  --surface: #fff;
  --border: #E2E8F0;
  --text: #0F172A;
  --text2: #475569;
  --text3: #94A3B8;
  --blue: #185FA5;
  --blue-bg: #EFF6FF;
  --green: #166534;
  --green-bg: #F0FDF4;
  --red: #DC2626;
  --red-bg: #FEF2F2;
  --amber: #D97706;
  --amber-bg: #FFFBEB;
  --r: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  background: #0C2340;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.topbar-title { font-weight: 700; font-size: 15px; letter-spacing: .3px; }
.topbar-meta { font-size: 11px; color: rgba(255,255,255,.5); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-user { font-size: 12px; color: rgba(255,255,255,.8); }
.btn-logout {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  color: #fff; padding: 4px 12px; border-radius: 6px; cursor: pointer;
  font-size: 11px; transition: background .15s;
}
.btn-logout:hover { background: rgba(255,255,255,.22); }

/* ── LOGIN ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: calc(100vh - 48px);
}
.login-box {
  background: var(--surface); border-radius: 12px;
  padding: 32px 36px; width: 340px;
  box-shadow: 0 4px 24px rgba(0,0,0,.1);
  border: 1px solid var(--border);
}
.login-box h2 { font-size: 18px; margin-bottom: 6px; }
.login-box p { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
.field input {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 13px; outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--blue); }
.field { margin-bottom: 14px; }
.btn-primary {
  width: 100%; background: var(--blue); color: #fff; border: none;
  padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .9; }
.login-err { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ── LAYOUT ── */
#app-screen { display: none; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 20px; }

/* ── STATS CARDS ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
}
.stat-num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 11px; color: var(--text3); }
.stat-card.blue .stat-num { color: var(--blue); }
.stat-card.green .stat-num { color: var(--green); }
.stat-card.red .stat-num { color: var(--red); }
.stat-card.amber .stat-num { color: var(--amber); }

/* ── FILTROS ── */
.filters {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  margin-bottom: 14px;
}
.filters input, .filters select {
  padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; outline: none;
  background: var(--surface);
}
.filters input:focus, .filters select:focus { border-color: var(--blue); }
.filters input { width: 220px; }

/* ── TABELA ── */
.table-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; background: var(--surface); }
thead { background: var(--bg2); }
th {
  text-align: left; padding: 10px 12px;
  font-size: 11px; font-weight: 700; color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
}
th:hover { color: var(--blue); }
td {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  font-size: 12px; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg2); }
tr.banido-row td { background: #FFF5F5; }

/* ── BADGES ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 700; white-space: nowrap;
}
.badge-trial    { background: #EFF6FF; color: #1E40AF; }
.badge-solo     { background: #ECFDF5; color: #065F46; }
.badge-pro      { background: #F5F3FF; color: #5B21B6; }
.badge-escrit   { background: #FFF9EB; color: #92400E; }
.badge-admin    { background: #FEF2F2; color: #991B1B; border: 1px solid #FCA5A5; }
.badge-banido   { background: var(--red-bg); color: var(--red); }
.badge-ok       { background: var(--green-bg); color: var(--green); }

/* ── AÇÕES ── */
.action-btn {
  padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; transition: all .12s;
  white-space: nowrap;
}
.action-btn.danger { background: var(--red-bg); color: var(--red); border-color: #FECACA; }
.action-btn.danger:hover { background: var(--red); color: #fff; }
.action-btn.success { background: var(--green-bg); color: var(--green); border-color: #86EFAC; }
.action-btn.success:hover { background: var(--green); color: #fff; }
.action-btn.neutral { background: var(--bg2); color: var(--text2); border-color: var(--border); }
.action-btn.neutral:hover { background: var(--border); }
.action-btn:disabled { opacity: .4; cursor: not-allowed; }

.actions-cell { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }

/* ── SELECT plano inline ── */
.plano-select {
  padding: 3px 6px; border: 1px solid var(--border);
  border-radius: 5px; font-size: 11px; background: var(--surface);
  cursor: pointer;
}

/* ── BARRA DE USO ── */
.uso-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  overflow: hidden; width: 80px; display: inline-block; vertical-align: middle;
  margin-right: 4px;
}
.uso-fill { height: 100%; border-radius: 2px; transition: width .3s; }

/* ── MODAIS ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 9999; display: flex; align-items: center; justify-content: center;
}
.modal-box {
  background: var(--surface); border-radius: 12px;
  padding: 24px 28px; max-width: 440px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal-box h3 { margin-bottom: 10px; }
.modal-box p { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button {
  padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text);
  transition: background .12s;
}
.modal-actions button.danger { background: var(--red); color: #fff; border-color: var(--red); }
.modal-actions button.primary { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── STATUS bar ── */
#status-bar {
  position: fixed; bottom: 16px; right: 16px;
  background: #0C2340; color: #fff; border-radius: 8px;
  padding: 8px 14px; font-size: 12px; z-index: 9998;
  display: none; box-shadow: 0 4px 16px rgba(0,0,0,.3);
}

/* ── LOADING ── */
.loading { color: var(--text3); font-size: 12px; padding: 20px; text-align: center; }

/* ── PAGINAÇÃO ── */
.pagination {
  display: flex; align-items: center; gap: 8px;
  margin-top: 12px; justify-content: flex-end; font-size: 12px;
}
.pagination button {
  padding: 4px 10px; border: 1px solid var(--border);
  border-radius: 5px; background: var(--surface); cursor: pointer;
}
.pagination button:disabled { opacity: .4; cursor: not-allowed; }
.pagination button:hover:not(:disabled) { background: var(--bg2); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <span class="topbar-title">⚙️ Admin — Gerador de Petições</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-user" id="admin-email-display"></span>
    <button class="btn-logout" onclick="fazerLogout()">Sair</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Acesso Administrativo</h2>
    <p>Restrito a administradores autorizados.</p>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="adm-email" placeholder="seu@email.com.br"
        onkeydown="if(event.key==='Enter')document.getElementById('adm-pwd').focus()" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="adm-pwd" placeholder="Sua senha"
        onkeydown="if(event.key==='Enter')fazerLogin()" />
    </div>
    <button class="btn-primary" onclick="fazerLogin()" id="btn-login">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="container">

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card blue">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total de usuários</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-trial">—</div>
        <div class="stat-label">Em demonstração</div>
      </div>
      <div class="stat-card green">
        <div class="stat-num" id="stat-pagos">—</div>
        <div class="stat-label">Planos pagos</div>
      </div>
      <div class="stat-card red">
        <div class="stat-num" id="stat-banidos">—</div>
        <div class="stat-label">Suspensos</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-num" id="stat-ativos30">—</div>
        <div class="stat-label">Ativos (30 dias)</div>
      </div>
    </div>

    <!-- Filtros + ações -->
    <div class="filters">
      <input type="text" id="filtro-busca" placeholder="🔎 Buscar nome, e-mail, OAB..."
        oninput="renderTabela()" />
      <select id="filtro-plano" onchange="renderTabela()">
        <option value="">Todos os planos</option>
        <option value="trial">Demonstração</option>
        <option value="solo">Ágil</option>
        <option value="pro">Avançado</option>
        <option value="escritorio">Escritório</option>
      </select>
      <select id="filtro-status" onchange="renderTabela()">
        <option value="">Todos</option>
        <option value="ativo">Ativos</option>
        <option value="banido">Suspensos</option>
      </select>
      <button class="action-btn neutral" onclick="carregarUsuarios()">↺ Atualizar</button>
      <button class="action-btn neutral" onclick="exportarCSV()" title="Exportar lista filtrada como CSV">⬇ Exportar CSV</button>
      <span id="contagem-label" style="font-size:11px;color:var(--text3);margin-left:4px"></span>
    </div>

    <!-- Tabela -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('nome')">Nome ↕</th>
            <th onclick="sortBy('email')">E-mail ↕</th>
            <th onclick="sortBy('plano')">Plano ↕</th>
            <th onclick="sortBy('pecas_mes')">Uso / mês ↕</th>
            <th onclick="sortBy('criado_em')">Cadastro ↕</th>
            <th onclick="sortBy('ultimo_acesso')">Último acesso ↕</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-body">
          <tr><td colspan="8" class="loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Paginação -->
    <div class="pagination">
      <button id="btn-prev" onclick="mudarPagina(-1)" disabled>← Anterior</button>
      <span id="pag-label">—</span>
      <button id="btn-next" onclick="mudarPagina(1)" disabled>Próxima →</button>
    </div>

  </div>
</div>

<!-- Status bar -->
<div id="status-bar"></div>

<script>
// ── CONFIGURAÇÃO SUPABASE ─────────────────────────────────────────────────────
var SUPABASE_URL = 'https://qlpqybumoaxndzppddyk.supabase.co';
var SUPABASE_KEY = 'sb_publishable_4jCX4bv9-Di7XA1oAOHPIw_sSREyHeL';
var supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── ESTADO ────────────────────────────────────────────────────────────────────
var todosUsuarios = [];
var sortCol = 'ultimo_acesso';
var sortAsc = false;
var paginaAtual = 1;
var POR_PAGINA = 30;

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function fazerLogin() {
  var email = document.getElementById('adm-email').value.trim();
  var pwd   = document.getElementById('adm-pwd').value;
  var errEl = document.getElementById('login-err');
  var btn   = document.getElementById('btn-login');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  try {
    var r = await supa.auth.signInWithPassword({ email, password: pwd });
    if (r.error) throw r.error;
    await verificarAdmin(r.data.user);
  } catch(e) {
    errEl.textContent = e.message || 'Erro ao entrar.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function verificarAdmin(user) {
  var r = await supa.from('gp_users').select('is_admin, nome, email').eq('id', user.id).maybeSingle();
  if (!r.data || !r.data.is_admin) {
    await supa.auth.signOut();
    document.getElementById('login-err').textContent = 'Acesso negado. Conta sem privilégios de administrador.';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = '';
  document.getElementById('admin-email-display').textContent = (r.data.nome || user.email);
  carregarUsuarios();
}

async function fazerLogout() {
  await supa.auth.signOut();
  location.reload();
}

// Restaurar sessão ao carregar
supa.auth.getSession().then(function(r) {
  if (r.data && r.data.session && r.data.session.user) {
    verificarAdmin(r.data.session.user);
  }
});

// ── CARREGAR DADOS ────────────────────────────────────────────────────────────
async function carregarUsuarios() {
  document.getElementById('tabela-body').innerHTML = '<tr><td colspan="8" class="loading">Carregando...</td></tr>';
  try {
    var r = await supa.from('gp_users')
      .select('id, nome, email, oab, plano, pecas_mes, criado_em, ultimo_acesso, banido, banido_motivo, is_admin, session_id')
      .order('ultimo_acesso', { ascending: false });
    if (r.error) throw r.error;
    todosUsuarios = r.data || [];
    calcularStats();
    renderTabela();
  } catch(e) {
    document.getElementById('tabela-body').innerHTML = '<tr><td colspan="8" class="loading" style="color:var(--red)">Erro: ' + e.message + '</td></tr>';
  }
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function calcularStats() {
  var total    = todosUsuarios.length;
  var trial    = todosUsuarios.filter(function(u){ return u.plano === 'trial'; }).length;
  var pagos    = todosUsuarios.filter(function(u){ return u.plano !== 'trial'; }).length;
  var banidos  = todosUsuarios.filter(function(u){ return u.banido; }).length;
  var limite30 = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
  var ativos   = todosUsuarios.filter(function(u){ return u.ultimo_acesso && u.ultimo_acesso > limite30; }).length;
  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-trial').textContent    = trial;
  document.getElementById('stat-pagos').textContent    = pagos;
  document.getElementById('stat-banidos').textContent  = banidos;
  document.getElementById('stat-ativos30').textContent = ativos;
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = true; }
  paginaAtual = 1;
  renderTabela();
}

// ── EXPORTAR CSV ──────────────────────────────────────────────────────────────
function exportarCSV() {
  var busca  = (document.getElementById('filtro-busca').value || '').toLowerCase();
  var plano  = document.getElementById('filtro-plano').value;
  var status = document.getElementById('filtro-status').value;
  var lista  = todosUsuarios.filter(function(u) {
    if (busca  && !(u.nome||'').toLowerCase().includes(busca) && !(u.email||'').toLowerCase().includes(busca)) return false;
    if (plano  && u.plano !== plano) return false;
    if (status === 'ativo'  && u.banido) return false;
    if (status === 'banido' && !u.banido) return false;
    return true;
  });
  var cols = ['nome','email','oab','plano','pecas_mes','criado_em','ultimo_acesso','banido','banido_motivo'];
  var headers = ['Nome','E-mail','OAB','Plano','Uso/mês','Cadastro','Último acesso','Suspenso','Motivo suspensão'];
  var rows = [headers.join(';')];
  lista.forEach(function(u) {
    rows.push(cols.map(function(c) {
      var v = u[c] == null ? '' : String(u[c]);
      return '"' + v.replace(/"/g,'""') + '"';
    }).join(';'));
  });
  var blob = new Blob(['﻿' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'usuarios_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
}

// ── FILTROS + RENDER ──────────────────────────────────────────────────────────
function renderTabela() {
  var busca   = (document.getElementById('filtro-busca').value || '').toLowerCase();
  var plano   = document.getElementById('filtro-plano').value;
  var status  = document.getElementById('filtro-status').value;

  var filtrados = todosUsuarios.filter(function(u) {
    if (plano  && u.plano !== plano)                    return false;
    if (status === 'banido' && !u.banido)               return false;
    if (status === 'ativo'  && u.banido)                return false;
    if (busca) {
      var haystack = [(u.nome||''), (u.email||''), (u.oab||'')].join(' ').toLowerCase();
      if (!haystack.includes(busca))                    return false;
    }
    return true;
  });

  // Sort
  filtrados.sort(function(a, b) {
    var va = a[sortCol] ?? '';
    var vb = b[sortCol] ?? '';
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });

  // Paginação
  var total  = filtrados.length;
  var inicio = (paginaAtual - 1) * POR_PAGINA;
  var fim    = Math.min(inicio + POR_PAGINA, total);
  var pagina = filtrados.slice(inicio, fim);
  var totalPags = Math.max(1, Math.ceil(total / POR_PAGINA));

  document.getElementById('contagem-label').textContent = total + ' usuário(s)';
  document.getElementById('pag-label').textContent = 'Página ' + paginaAtual + ' de ' + totalPags;
  document.getElementById('btn-prev').disabled = paginaAtual <= 1;
  document.getElementById('btn-next').disabled = paginaAtual >= totalPags;

  if (!pagina.length) {
    document.getElementById('tabela-body').innerHTML = '<tr><td colspan="8" class="loading">Nenhum usuário encontrado.</td></tr>';
    return;
  }

  var html = pagina.map(function(u) {
    var limite  = { trial:25, solo:150, pro:300, escritorio:300 }[u.plano] || 25;
    var pct     = Math.min(100, Math.round(((u.pecas_mes||0) / limite) * 100));
    var corBarra= pct >= 90 ? '#DC2626' : pct >= 70 ? '#D97706' : '#185FA5';
    var labelPlano = { trial:'Demonstração', solo:'Ágil', pro:'Avançado', escritorio:'Escritório' }[u.plano] || u.plano;
    var classPlano = { trial:'badge-trial', solo:'badge-solo', pro:'badge-pro', escritorio:'badge-escrit' }[u.plano] || 'badge-trial';

    // Dias restantes do trial
    var diasTrialHtml = '';
    if (u.plano === 'trial' && u.criado_em) {
      var expiraMs = new Date(u.criado_em).getTime() + 30 * 24 * 60 * 60 * 1000;
      var diasRestantes = Math.ceil((expiraMs - Date.now()) / (24 * 60 * 60 * 1000));
      if (diasRestantes <= 0) {
        diasTrialHtml = ' <span style="color:#DC2626;font-size:10px">EXPIRADO</span>';
      } else if (diasRestantes <= 7) {
        diasTrialHtml = ' <span style="color:#D97706;font-size:10px">' + diasRestantes + 'd</span>';
      }
    }

    var dataUltAcesso = u.ultimo_acesso ? new Date(u.ultimo_acesso).toLocaleDateString('pt-BR') : '—';
    var dataCadastro  = u.criado_em     ? new Date(u.criado_em).toLocaleDateString('pt-BR')     : '—';
    var uid = escId(u.id);

    return '<tr class="' + (u.banido ? 'banido-row' : '') + '">' +
      '<td>' + esc(u.nome || '—') + (u.is_admin ? ' <span class="badge badge-admin">ADMIN</span>' : '') + '</td>' +
      '<td style="color:var(--text2)">' + esc(u.email || '—') + '</td>' +
      '<td>' +
        '<select class="plano-select" onchange="alterarPlano(\'' + uid + '\',this.value)">' +
          '<option value="trial"'      + (u.plano==='trial'      ? ' selected' : '') + '>Demonstração</option>' +
          '<option value="solo"'       + (u.plano==='solo'       ? ' selected' : '') + '>Ágil</option>' +
          '<option value="pro"'        + (u.plano==='pro'        ? ' selected' : '') + '>Avançado</option>' +
          '<option value="escritorio"' + (u.plano==='escritorio' ? ' selected' : '') + '>Escritório</option>' +
        '</select>' +
        diasTrialHtml +
      '</td>' +
      '<td>' +
        '<div class="uso-bar"><div class="uso-fill" style="width:' + pct + '%;background:' + corBarra + '"></div></div>' +
        (u.pecas_mes||0) + '/' + limite +
      '</td>' +
      '<td style="color:var(--text3)">' + dataCadastro  + '</td>' +
      '<td style="color:var(--text3)">' + dataUltAcesso + '</td>' +
      '<td>' + (u.banido
        ? '<span class="badge badge-banido" title="' + esc(u.banido_motivo||'') + '">🚫 Suspenso</span>'
        : '<span class="badge badge-ok">✓ Ativo</span>') +
      '</td>' +
      '<td><div class="actions-cell">' +
        (u.banido
          ? '<button class="action-btn success" onclick="desbanirUsuario(\'' + uid + '\')">✓ Reativar</button>'
          : '<button class="action-btn danger"  onclick="banirUsuario(\'' + uid + '\',\'' + esc(u.nome||u.email||'') + '\')">🚫 Suspender</button>') +
        '<button class="action-btn neutral" onclick="resetarContador(\'' + uid + '\')">↺ Zerar peças</button>' +
        (u.is_admin
          ? '<button class="action-btn danger" onclick="toggleAdmin(\'' + uid + '\',false)">− Admin</button>'
          : '<button class="action-btn neutral" onclick="toggleAdmin(\'' + uid + '\',true)">+ Admin</button>') +
      '</div></td>' +
    '</tr>';
  }).join('');

  document.getElementById('tabela-body').innerHTML = html;
}

function mudarPagina(delta) {
  paginaAtual += delta;
  renderTabela();
}

// ── AÇÕES ─────────────────────────────────────────────────────────────────────
async function alterarPlano(uid, novoPlano) {
  await supaUpdate(uid, { plano: novoPlano }, 'Plano atualizado.');
}

function banirUsuario(uid, nome) {
  var motivo = prompt('Motivo da suspensão para "' + nome + '" (será exibido ao usuário):\n\nEx: Uso indevido, compartilhamento de credenciais, pagamento pendente...', 'Uso indevido detectado pelo administrador');
  if (motivo === null) return; // cancelado
  supaUpdate(uid, { banido: true, banido_motivo: motivo || 'Suspensão administrativa' }, 'Usuário suspenso.');
}

async function desbanirUsuario(uid) {
  await supaUpdate(uid, { banido: false, banido_motivo: null }, 'Usuário reativado.');
}

async function resetarContador(uid) {
  if (!confirm('Zerar o contador de peças deste usuário?')) return;
  await supaUpdate(uid, { pecas_mes: 0, pecas_mes_reset: new Date().toISOString() }, 'Contador zerado.');
}

async function toggleAdmin(uid, valor) {
  var acao = valor ? 'conceder' : 'remover';
  if (!confirm('Deseja ' + acao + ' privilégios de administrador para este usuário?')) return;
  await supaUpdate(uid, { is_admin: valor }, valor ? 'Admin concedido.' : 'Admin removido.');
}

async function supaUpdate(uid, dados, msg) {
  try {
    var r = await supa.from('gp_users').update(dados).eq('id', uid);
    if (r.error) throw r.error;
    // Atualizar cache local
    var idx = todosUsuarios.findIndex(function(u){ return u.id === uid; });
    if (idx !== -1) Object.assign(todosUsuarios[idx], dados);
    calcularStats();
    renderTabela();
    mostrarStatus('✓ ' + msg, 2500);
  } catch(e) {
    mostrarStatus('Erro: ' + e.message, 4000);
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escId(str) { return String(str).replace(/[^a-zA-Z0-9\-]/g,''); }

function mostrarStatus(msg, duracao) {
  var el = document.getElementById('status-bar');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(function(){ el.style.display = 'none'; }, duracao || 2500);
}

// Enter para login
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    fazerLogin();
  }
});
</script>
